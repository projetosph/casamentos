<!-- ================= HOME ================= -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulo & Alana</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

<script type="module" src="script.js"></script>
<header>
  <div class="logo">P & A</div>
  <a href="presentes.html" class="btn">Lista de Presentes</a>
</header>

<div class="box">
  <h2>💖 Quem já presenteou</h2>
  <div id="listaPagamentos"></div>
</div>

<section class="hero">
  <h1>Paulo & Alana</h1>
  <p>Faltam <span id="contador"></span> dias 💜</p>
</section>

<section class="grid">

  <!-- 1 - Lista de Presentes -->
  <div class="box">
    <h2>🎁 Lista de Presentes</h2>
    <a href="presentes.html" class="btn">Ver Lista</a>
  </div>

  <!-- 2 - Recado -->
  <div class="box">
    <h2>💌 Recado</h2>
    <textarea placeholder="Deixe uma mensagem"></textarea>
  </div>

  <!-- 3 - Local -->
  <div class="box">
    <h2>📍 Local</h2>
    <iframe src="https://maps.google.com/maps?q=salvador&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
  </div>

  <!-- 4 - Música -->
  <div class="box">
    <h2>🎵 Nossa Música</h2>
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/4uLU6hMCjMI75M1A2tKUQC"></iframe>
  </div>

</section>

<script>
const dataCasamento = new Date("2026-12-20");
const hoje = new Date();
const diff = Math.ceil((dataCasamento - hoje) / (1000*60*60*24));
document.getElementById("contador").innerText = diff;
</script>

</body>
</html>
<script>
const boxes = document.querySelectorAll(".box");

window.addEventListener("load", () => {
  boxes.forEach((box, i) => {
    setTimeout(() => {
      box.classList.add("show");
    }, i * 200);
  });
});
</script>
